<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Czarm & Pat's Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #0d0a14;
      --surface: #160f24;
      --surface2: #1f1535;
      --accent: #c084fc;
      --accent2: #f0abfc;
      --gold: #fbbf24;
      --text: #f3e8ff;
      --text-muted: #a78bca;
      --border: rgba(192, 132, 252, 0.2);
      --glow: rgba(192, 132, 252, 0.3);
      --radius: 14px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(139, 92, 246, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 85%, rgba(192, 132, 252, 0.12) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: rgba(13, 10, 20, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
    }

    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--accent2);
      letter-spacing: 0.02em;
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 4px; }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--accent2);
      background: rgba(192, 132, 252, 0.1);
    }

    #nav-check { display: none; }

    .nav-btn {
      display: none;
      cursor: pointer;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
    }

    .nav-btn span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-muted);
      border-radius: 2px;
      transition: 0.3s;
    }

    @media (max-width: 600px) {
      .nav-btn { display: flex; }
      .nav-links {
        position: absolute;
        top: 56px;
        left: 0;
        width: 100%;
        background: rgba(13, 10, 20, 0.97);
        flex-direction: column;
        gap: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        border-bottom: 1px solid var(--border);
      }
      .nav-links a { padding: 14px 28px; border-radius: 0; }
      #nav-check:checked ~ .nav-links { max-height: 300px; }
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 24px 72px;
    }

    .hero { text-align: center; margin-bottom: 48px; }

    .hero-eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      background: linear-gradient(135deg, #f3e8ff 0%, var(--accent2) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .hero-sub { margin-top: 10px; font-size: 14px; color: var(--text-muted); }

    .gallery-grid { columns: 3 280px; column-gap: 16px; }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 0.5s ease both;
    }

    .gallery-item:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(192, 132, 252, 0.2), 0 0 0 1px rgba(192, 132, 252, 0.3);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      transition: filter 0.3s ease;
    }

    .gallery-item:hover img { filter: brightness(1.08); }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(124, 58, 237, 0.5) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .gallery-item:hover .overlay { opacity: 1; }

    .overlay-icon {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-left: auto;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(14px);
    }

    .lightbox-box {
      position: relative;
      z-index: 1;
      max-width: min(90vw, 860px);
      max-height: 90vh;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(192, 132, 252, 0.15);
      transform: scale(0.94) translateY(12px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open .lightbox-box { transform: scale(1) translateY(0); }

    .lightbox-box img {
      display: block;
      max-width: 100%;
      max-height: 86vh;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 48px;
      height: 48px;
      background: rgba(13, 10, 20, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(192, 132, 252, 0.35);
      border-radius: 50%;
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      margin: 0 10px;
    }

    .lb-arrow:hover {
      background: rgba(192, 132, 252, 0.35);
      border-color: rgba(192, 132, 252, 0.7);
      transform: translateY(-50%) scale(1.08);
    }

    .lb-arrow.prev { left: 0; }
    .lb-arrow.next { right: 0; }

    @media (max-width: 480px) {
      .lb-arrow { width: 38px; height: 38px; font-size: 18px; margin: 0 4px; }
    }

    .lb-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 11;
      width: 36px;
      height: 36px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lb-close:hover { background: rgba(192, 132, 252, 0.4); }

    .lb-counter {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      padding: 3px 12px;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .gallery-count {
      text-align: center;
      margin-bottom: 28px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .gallery-count span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-backdrop" id="lb-backdrop"></div>
    <div class="lightbox-box" id="lb-box">
      <button class="lb-close" id="lb-close" title="Close">✕</button>
      <button class="lb-arrow prev" id="lb-prev" title="Previous">‹</button>
      <img src="" alt="Full view" id="lb-img" />
      <button class="lb-arrow next" id="lb-next" title="Next">›</button>
      <div class="lb-counter" id="lb-counter">1 / 36</div>
    </div>
  </div>

  <script>
    const items = Array.from(document.querySelectorAll('.gallery-item'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    function getSrc(index) {
      return items[index].querySelector('img').src;
    }

    function openLightbox(index) {
      current = index;
      lbImg.src = getSrc(current);
      lbImg.style.opacity = '1';
      lbImg.style.transform = 'translateX(0)';
      lbCounter.textContent = `${current + 1} / ${items.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { lbImg.src = ''; }, 300);
    }

    function navigate(dir) {
      current = (current + dir + items.length) % items.length;
      lbImg.style.transition = 'none';
      lbImg.style.opacity = '0';
      lbImg.style.transform = `translateX(${dir > 0 ? '30px' : '-30px'})`;
      setTimeout(() => {
        lbImg.src = getSrc(current);
        lbCounter.textContent = `${current + 1} / ${items.length}`;
        lbImg.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
        lbImg.style.opacity = '1';
        lbImg.style.transform = 'translateX(0)';
      }, 150);
    }

    items.forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-backdrop').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); navigate(-1); });
    document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); navigate(1); });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    let touchStartX = 0;
    document.getElementById('lb-box').addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.getElementById('lb-box').addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) navigate(diff > 0 ? 1 : -1);
    });
  </script>
